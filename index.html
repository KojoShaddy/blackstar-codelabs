<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Primary Meta Tags -->
  <title>BlackStar CodeLabs | Practical Google Cloud AI Codelabs</title>
  <meta name="title" content="BlackStar CodeLabs | Practical Google Cloud AI Codelabs">
  <meta name="description" content="Practical Google Cloud AI codelabs for developers. Learn modern technologies by building real applications with step-by-step guides.">
  <meta name="keywords" content="Google Cloud, Google Cloud AI, AI codelabs, Google Cloud tutorials, Vertex AI, Gemini API, Cloud Run, Firebase, BigQuery, developer tutorials, cloud computing, software engineering, BlackStar CodeLabs">
  <meta name="author" content="BlackStar CodeLabs">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0F172A">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="BlackStar CodeLabs | Practical Google Cloud AI Codelabs">
  <meta property="og:description" content="Practical Google Cloud AI codelabs for developers. Learn modern technologies by building real applications with step-by-step guides.">
  <meta property="og:url" content="https://blackstar-codelabs.pages.dev/">
  <meta property="og:site_name" content="BlackStar CodeLabs">
  <meta property="og:image" content="https://blackstar-codelabs.pages.dev/og-image.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BlackStar CodeLabs | Practical Google Cloud AI Codelabs">
  <meta name="twitter:description" content="Practical Google Cloud AI codelabs for developers. Learn modern technologies by building real applications with step-by-step guides.">
  <meta name="twitter:image" content="https://blackstar-codelabs.pages.dev/og-image.png">

  <!-- Canonical -->
  <link rel="canonical" href="https://blackstar-codelabs.pages.dev/">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⭐</text></svg>">
</head>
<body>

  <!-- Confetti Canvas overlay for celebration step -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Navigation Header -->
  <header id="header">
    <div class="header-left">
      <button id="mobile-toggle" class="mobile-nav-toggle" aria-label="Toggle Navigation">☰</button>
      <div class="header-logo-container" style="cursor: pointer;" onclick="window.location.hash='#home'">
        <div class="logo-icon" style="background: transparent;">
          <img src="assets/logo/logo.png" alt="Blackstar Logo" style="width: 100%; height: 100%; object-fit: contain; display: block;">
        </div>
        <div class="header-title-wrapper">
          <span class="header-tag">Blackstar Codelabs</span>
          <span id="header-title" class="header-title">Interactive Portal</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <!-- Codelab Progress Indicators -->
      <div id="header-progress" class="progress-container">
        <span id="progress-info-text" class="progress-info">0% Complete</span>
        <div class="progress-bar-bg">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
      </div>
      <!-- Theme Switcher -->
      <button id="theme-toggle" class="btn-theme-toggle" title="Toggle Light/Dark Theme" aria-label="Toggle Theme">
        <!-- Sun icon default -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Sidebar Overlay for mobile screen sizing -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Homepage View Container -->
  <div id="home-view" class="home-view"></div>

  <!-- Main Codelab Shell -->
  <div id="codelab-view" class="main-wrapper">
    <!-- Sidebar Navigation -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h3 id="sidebar-category" class="sidebar-title">Web & AI</h3>
      </div>
      <ul id="sidebar-steps-list" class="sidebar-steps-list">
        <!-- Sidebar step items will be dynamically generated by app.js -->
      </ul>
    </aside>

    <!-- Main Content Panel -->
    <main id="content-panel">
      <div class="content-inner">
        <!-- Rendered Step content goes here -->
        <article id="step-content-area">
          <!-- Step HTML contents will be dynamically written by app.js -->
        </article>
      </div>
    </main>

    <!-- Footer Controls -->
    <footer id="footer-controls">
      <button id="btn-prev" class="control-btn btn-prev" disabled>➔ Previous Step</button>
      <button id="btn-next" class="control-btn btn-next">Next Step ➔</button>
    </footer>
  </div>

  <!-- Load step configuration data first -->
  <script src="js/content.js"></script>
  <!-- Load application control scripts -->
  <script src="js/app.js"></script>
</body>
</html>
